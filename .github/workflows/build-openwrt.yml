name: Build FW28-V21 Stable (No Custom DTS)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses-dev git python3 unzip wget gawk flex bison libssl-dev zlib1g-dev libelf-dev subversion libncursesw5-dev libreadline-dev libtool automake autoconf pkg-config ccache gcc-multilib g++-multilib

      - name: Clone OpenWrt
        uses: actions/checkout@v4.2.2
        with:
          repository: openwrt/openwrt
          ref: openwrt-23.05

      - name: Prepare files
        run: |
          mkdir -p files/etc/uci-defaults files/etc/hotplug.d/iface files/etc/config files/usr/share/usb_modeswitch

          # 1. 开机启用 PCIe（通过 overlay）
          cat > files/etc/uci-defaults/99-enable-pcie <<'EOF'
          #!/bin/sh
          if [ ! -f /lib/firmware/pcie-okay.dtb ]; then
              mkdir -p /etc/device-properties.d
              echo '/dts-v1/; / { compatible = "mediatek,mt7628an-soc"; pcie { status = "okay"; }; };' > /etc/device-properties.d/pcie-fix.dts
              dtc -I dts -O dtb /etc/device-properties.d/pcie-fix.dts -o /lib/firmware/pcie-okay.dtb
              uci set system.@system[0].overlay="/lib/firmware/pcie-okay.dtb"
              uci commit system
              reboot
          fi
          EOF

          # 2. 交换机修复 + 网口强制百兆
          cat > files/etc/uci-defaults/99-switch-fix <<'EOF'
          #!/bin/sh
          swconfig dev switch0 set reset 2>/dev/null
          swconfig dev switch0 set enable_vlan 0 2>/dev/null
          swconfig dev switch0 set apply 2>/dev/null
          ethtool -s eth0 speed 100 duplex full autoneg off 2>/dev/null
          uci set network.lan.ifname='eth0'
          uci commit network
          /etc/init.d/network restart
          EOF

          # 3. 展锐模块模式切换
          cat > files/etc/uci-defaults/99-unisoc-mode <<'EOF'
          #!/bin/sh
          if lsusb | grep -q "1782:4e00"; then
              /usr/sbin/usb_modeswitch -v 1782 -p 4e00 -W
              sleep 3
          fi
          modprobe option 2>/dev/null
          modprobe qmi_wwan 2>/dev/null
          EOF

          chmod +x files/etc/uci-defaults/*

          # 4. usb_modeswitch 规则
          cat > files/usr/share/usb_modeswitch/1782:4e00 <<'MODESWITCH'
          TargetVendor=0x1782
          TargetProduct=0x4e00
          MessageContent="5553424312345678000000000000061b000000020000000000000000000000"
          MODESWITCH

          # 5. 网络配置（QMI 接口）
          cat > files/etc/config/network <<'NETWORK'
          config interface 'loopback'
          	option device 'lo'
          	option proto 'static'
          	option ipaddr '127.0.0.1'
          	option netmask '255.0.0.0'
          config globals 'globals'
          	option ula_prefix 'fd00::/48'
          config device
          	option name 'br-lan'
          	option type 'bridge'
          	list ports 'eth0'
          config interface 'lan'
          	option device 'br-lan'
          	option proto 'static'
          	option ipaddr '192.168.1.1'
          	option netmask '255.255.255.0'
          config interface '4g'
          	option proto 'qmi'
          	option device '/dev/cdc-wdm0'
          	option apn ''
          	option auth 'none'
          	option pincode ''
          NETWORK

          # 6. 自动 APN 脚本
          cat > files/etc/hotplug.d/iface/99-auto-apn <<'APN'
          #!/bin/sh
          [ "$ACTION" = "ifup" ] && [ "$INTERFACE" = "4g" ] || exit 0
          logger -t "auto-apn" "4G up, detecting APN..."
          sleep 8
          IMSI=$(uqmi -d /dev/cdc-wdm0 --get-imsi 2>/dev/null | grep -oE '[0-9]+')
          [ -z "$IMSI" ] && exit 1
          MCCMNC=$(echo "$IMSI" | cut -c1-5)
          case "$MCCMNC" in
              46000|46002|46004|46007|46008) APN="cmnet" ;;
              46001|46006|46009)             APN="3gnet" ;;
              46003|46005|46011)             APN="ctnet" ;;
              *)                             APN="" ;;
          esac
          if [ -n "$APN" ] && [ "$(uci -q get network.4g.apn)" != "$APN" ]; then
              logger -t "auto-apn" "Set APN to $APN"
              uci set network.4g.apn="$APN"
              uci commit network
              ifup 4g
          fi
          APN
          chmod +x files/etc/hotplug.d/iface/99-auto-apn

          # 7. 网络优化（关闭 IPv6、BBR、DNS）
          cat > files/etc/uci-defaults/99-network-tune <<'TUNE'
          #!/bin/sh
          uci set network.lan.ipv6='0'
          uci set network.4g.ipv6='0'
          uci commit network
          echo 'net.ipv6.conf.all.disable_ipv6=1' >> /etc/sysctl.conf
          echo 'net.ipv6.conf.default.disable_ipv6=1' >> /etc/sysctl.conf
          echo 'net.core.default_qdisc=fq' >> /etc/sysctl.conf
          echo 'net.ipv4.tcp_congestion_control=bbr' >> /etc/sysctl.conf
          uci set dhcp.@dnsmasq[0].server='223.5.5.5'
          uci add_list dhcp.@dnsmasq[0].server='114.114.114.114'
          uci commit dhcp
          TUNE
          chmod +x files/etc/uci-defaults/99-network-tune

      - name: Write .config
        run: |
          cat > .config <<'CONFIG'
          CONFIG_TARGET_ramips=y
          CONFIG_TARGET_ramips_mt76x8=y
          CONFIG_TARGET_ramips_mt76x8_DEVICE_mediatek_mt7628an-eval-board=y
          CONFIG_TARGET_OPTIMIZATION="-Os -pipe"
          CONFIG_SMALL_FLASH=y
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_TARGET_KERNEL_PARTSIZE=2048
          CONFIG_TARGET_ROOTFS_PARTSIZE=9728
          CONFIG_PACKAGE_kmod-mt76x8=y
          CONFIG_PACKAGE_kmod-usb-core=y
          CONFIG_PACKAGE_kmod-usb2=y
          CONFIG_PACKAGE_kmod-usb-ohci=y
          CONFIG_PACKAGE_kmod-usb-serial=y
          CONFIG_PACKAGE_kmod-usb-serial-option=y
          CONFIG_PACKAGE_kmod-usb-net=y
          CONFIG_PACKAGE_kmod-usb-net-qmi-wwan=y
          CONFIG_PACKAGE_usb-modeswitch=y
          CONFIG_PACKAGE_uqmi=y
          CONFIG_PACKAGE_luci-proto-qmi=y
          CONFIG_PACKAGE_luci-i18n-qmi-zh-cn=y
          CONFIG_PACKAGE_dnsmasq=y
          CONFIG_PACKAGE_firewall=y
          CONFIG_PACKAGE_wpad-basic-mbedtls=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-base=y
          CONFIG_PACKAGE_luci-mod-network=y
          CONFIG_PACKAGE_luci-theme-bootstrap=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_uhttpd=y
          CONFIG_PACKAGE_dropbear=y
          CONFIG_PACKAGE_ethtool=y
          # CONFIG_IPV6 is not set
          CONFIG

      - name: Make defconfig
        run: make defconfig

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Download packages
        run: make download -j$(nproc)

      - name: Build firmware
        run: make -j$(nproc) V=s

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FW28-V21-Stable
          path: bin/targets/ramips/mt76x8/*sysupgrade.bin
          if-no-files-found: error
