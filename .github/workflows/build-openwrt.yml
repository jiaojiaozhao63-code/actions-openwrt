name: FW28-V21 4G 最终版（永不卡死版）
on:
  workflow_dispatch:

env:
  OPENWRT_DIR: openwrt

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses-dev git python3 unzip gawk flex bison libssl-dev

      - name: 克隆 OpenWrt
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: openwrt-23.05
          path: ${{ env.OPENWRT_DIR }}

      # 清除缓存（必须清，否则继续卡死）
      - name: 删除缓存目录
        run: |
          cd $OPENWRT_DIR
          rm -rf build_dir staging_dir dl .ccache feeds

      - name: 写入定制文件
        run: |
          mkdir -p ${OPENWRT_DIR}/files/etc/config \
                   ${OPENWRT_DIR}/files/etc/init.d \
                   ${OPENWRT_DIR}/files/etc/sysctl.d

          cat > ${OPENWRT_DIR}/files/etc/config/network <<'EOF'
config interface 'loopback'
  option device 'lo'
  option proto 'static'
  option ipaddr '127.0.0.1'

config device
  option name 'br-lan'
  list ports 'eth0'

config interface 'lan'
  option device 'br-lan'
  option proto 'static'
  option ipaddr '192.168.1.1'

config interface '4g'
  option proto 'qmi'
  option device '/dev/cdc-wdm0'
  option apn 'cmnet'
  option ipv6 '0'
EOF

      - name: 添加设备定义
        run: |
          cd $OPENWRT_DIR
          echo '' >> target/linux/ramips/image/mt76x8.mk
          cat >> target/linux/ramips/image/mt76x8.mk <<'DEV'
define Device/fw28-v21
  DEVICE_PACKAGES := kmod-usb2 kmod-usb-serial kmod-usb-serial-option kmod-usb-net-qmi-wwan usb-modeswitch uqmi luci-proto-qmi
  KERNEL_LOADADDR := 0x80000000
  IMAGE_SIZE := 7872k
endef
TARGET_DEVICES += fw28-v21
DEV

      - name: 安装 feeds
        run: |
          cd $OPENWRT_DIR
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # ==========================================
      # 【关键：直接给完整.config，不跑任何make config】
      # ==========================================
      - name: 写入最终.config
        run: |
          cd $OPENWRT_DIR
          cat > .config <<'EOF'
CONFIG_TARGET_ramips=y
CONFIG_TARGET_ramips_mt76x8=y
CONFIG_TARGET_ramips_mt76x8_DEVICE_fw28-v21=y
CONFIG_SMALL_FLASH=y
CONFIG_PACKAGE_kmod-usb-net-qmi-wwan=y
CONFIG_PACKAGE_usb-modeswitch=y
CONFIG_PACKAGE_uqmi=y
CONFIG_PACKAGE_luci=y
CONFIG_PACKAGE_luci-proto-qmi=y
# CONFIG_IPV6 is not set
EOF

      # ==========================================
      # 【最关键：直接编译，不执行任何配置命令】
      # 这一步跳过卡死环节
      # ==========================================
      - name: 下载包
        run: cd $OPENWRT_DIR && make download -j1

      - name: 开始编译
        run: cd $OPENWRT_DIR && make -j1 V=s

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: FW28-V21
          path: ${{ env.OPENWRT_DIR }}/bin/targets/ramips/mt76x8/*factory.bin
