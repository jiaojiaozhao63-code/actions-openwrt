name: Build OpenWrt 23.05 for FW28-V21 (Fixed DTS + QMI)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses-dev git python3 unzip wget gawk flex bison libssl-dev zlib1g-dev libelf-dev subversion libncursesw5-dev libreadline-dev libtool automake autoconf pkg-config ccache gcc-multilib g++-multilib

      - name: Clone OpenWrt 23.05
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: openwrt-23.05

      - name: Create custom DTS and config files
        run: |
          mkdir -p target/linux/ramips/dts
          mkdir -p files/etc/uci-defaults files/etc/hotplug.d/iface files/etc/config

          # 1. 精确适配的 DTS（GPIO、交换机已修正）
          cat > target/linux/ramips/dts/mt7628an_fw28-v21.dts <<'EOF'
          /dts-v1/;
          #include "mt7628an.dtsi"
          #include <dt-bindings/gpio/gpio.h>
          #include <dt-bindings/input/input.h>

          / {
          	compatible = "fw28,v21", "mediatek,mt7628an-soc";
          	model = "FW28-V21";

          	chosen {
          		bootargs = "console=ttyS0,57600";
          	};

          	memory@0 {
          		device_type = "memory";
          		reg = <0x0 0x4000000>;
          	};

          	keys {
          		compatible = "gpio-keys";
          		reset {
          			label = "reset";
          			gpios = <&gpio 38 GPIO_ACTIVE_LOW>;
          			linux,code = <KEY_RESTART>;
          		};
          	};

          	leds {
          		compatible = "gpio-leds";
          		system {
          			label = "orange:system";
          			gpios = <&gpio 11 GPIO_ACTIVE_LOW>;
          		};
          		wlan {
          			label = "blue:wlan";
          			gpios = <&gpio 12 GPIO_ACTIVE_LOW>;
          		};
          	};
          };

          &ethernet {
          	nvmem-cells = <&macaddr_factory_4>;
          	nvmem-cell-names = "mac-address";
          };

          &esw {
          	mediatek,portmap = <0x3f>;
          	mediatek,ephy-handle = <&ephy>;
          };

          &ephy {
          	compatible = "mediatek,mt7628-ephy", "mediatek,mtk-ephy";
          };

          &wmac {
          	status = "okay";
          	mediatek,mtd-eeprom = <&factory 0x0>;
          };

          &pcie {
          	status = "okay";
          };

          &pcie0 {
          	wifi@0,0 {
          		compatible = "mediatek,mt76";
          		reg = <0x0000 0 0 0 0>;
          	};
          };

          &spi0 {
          	status = "okay";
          	flash@0 {
          		compatible = "jedec,spi-nor";
          		reg = <0>;
          		spi-max-frequency = <40000000>;
          		partitions {
          			compatible = "fixed-partitions";
          			#address-cells = <1>;
          			#size-cells = <1>;
          			partition@0 {
          				label = "u-boot";
          				reg = <0x0 0x30000>;
          				read-only;
          			};
          			partition@30000 {
          				label = "u-boot-env";
          				reg = <0x30000 0x10000>;
          				read-only;
          			};
          			partition@40000 {
          				label = "factory";
          				reg = <0x40000 0x10000>;
          				read-only;
          				compatible = "nvmem-cells";
          				#address-cells = <1>;
          				#size-cells = <1>;
          				eeprom_factory_0: eeprom@0 {
          					reg = <0x0 0x400>;
          				};
          				macaddr_factory_4: macaddr@4 {
          					reg = <0x4 0x6>;
          				};
          			};
          			partition@50000 {
          				label = "firmware";
          				reg = <0x50000 0xfb0000>;
          				compatible = "denx,uimage";
          			};
          		};
          	};
          };

          &uart1 {
          	status = "okay";
          };
          EOF

          # 2. 添加设备到 mt76x8.mk
          cat >> target/linux/ramips/image/mt76x8.mk <<'EOF'

          define Device/fw28-v21
            IMAGE_SIZE := 16000k
            DEVICE_VENDOR := FW28
            DEVICE_MODEL := V21
            DEVICE_PACKAGES := kmod-usb2 kmod-usb-ohci kmod-usb-serial kmod-usb-serial-option kmod-usb-net kmod-usb-net-qmi-wwan usb-modeswitch uqmi luci-proto-qmi luci-i18n-qmi-zh-cn
            SUPPORTED_DEVICES += fw28,v21
          endef
          TARGET_DEVICES += fw28-v21
          EOF

          # 3. usb_modeswitch 强制切换规则
          mkdir -p files/usr/share/usb_modeswitch
          cat > files/usr/share/usb_modeswitch/1782:4e00 <<'EOF'
          TargetVendor=0x1782
          TargetProduct=0x4e00
          MessageContent="5553424312345678000000000000061b000000020000000000000000000000"
          EOF

          # 4. 开机切换模式并加载驱动
          cat > files/etc/uci-defaults/99-unisoc-init <<'EOF'
          #!/bin/sh
          if lsusb | grep -q "1782:4e00"; then
              logger -t "unisoc" "Switching UNISOC module..."
              /usr/sbin/usb_modeswitch -v 1782 -p 4e00 -W
              sleep 3
          fi
          modprobe usbserial 2>/dev/null
          modprobe option 2>/dev/null
          modprobe qmi_wwan 2>/dev/null
          EOF
          chmod +x files/etc/uci-defaults/99-unisoc-init

          # 5. QMI 接口配置
          cat > files/etc/config/network <<'EOF'
          config interface 'loopback'
          	option device 'lo'
          	option proto 'static'
          	option ipaddr '127.0.0.1'
          	option netmask '255.0.0.0'
          config globals 'globals'
          	option ula_prefix 'fd00::/48'
          config device
          	option name 'br-lan'
          	option type 'bridge'
          	list ports 'eth0'
          config interface 'lan'
          	option device 'br-lan'
          	option proto 'static'
          	option ipaddr '192.168.1.1'
          	option netmask '255.255.255.0'
          config interface '4g'
          	option proto 'qmi'
          	option device '/dev/cdc-wdm0'
          	option apn ''
          	option auth 'none'
          	option pincode ''
          EOF

          # 6. 自动 APN 脚本
          cat > files/etc/hotplug.d/iface/99-auto-apn <<'EOF'
          #!/bin/sh
          [ "$ACTION" = "ifup" ] && [ "$INTERFACE" = "4g" ] || exit 0
          logger -t "auto-apn" "4G up, detecting APN..."
          sleep 8
          IMSI=$(uqmi -d /dev/cdc-wdm0 --get-imsi 2>/dev/null | grep -oE '[0-9]+')
          [ -z "$IMSI" ] && exit 1
          MCCMNC=$(echo "$IMSI" | cut -c1-5)
          case "$MCCMNC" in
              46000|46002|46004|46007|46008) APN="cmnet" ;;
              46001|46006|46009)             APN="3gnet" ;;
              46003|46005|46011)             APN="ctnet" ;;
              *)                             APN="" ;;
          esac
          if [ -n "$APN" ] && [ "$(uci -q get network.4g.apn)" != "$APN" ]; then
              logger -t "auto-apn" "Set APN to $APN"
              uci set network.4g.apn="$APN"
              uci commit network
              ifup 4g
          fi
          EOF
          chmod +x files/etc/hotplug.d/iface/99-auto-apn

          # 7. 网络优化（关闭IPv6、启用BBR、指定DNS）
          cat > files/etc/uci-defaults/99-network-tune <<'EOF'
          #!/bin/sh
          uci set network.lan.ipv6='0'
          uci set network.4g.ipv6='0'
          uci commit network
          echo 'net.ipv6.conf.all.disable_ipv6=1' >> /etc/sysctl.conf
          echo 'net.ipv6.conf.default.disable_ipv6=1' >> /etc/sysctl.conf
          echo 'net.core.default_qdisc=fq' >> /etc/sysctl.conf
          echo 'net.ipv4.tcp_congestion_control=bbr' >> /etc/sysctl.conf
          uci set dhcp.@dnsmasq[0].server='223.5.5.5'
          uci add_list dhcp.@dnsmasq[0].server='114.114.114.114'
          uci commit dhcp
          EOF
          chmod +x files/etc/uci-defaults/99-network-tune

      - name: Write .config
        run: |
          cat > .config <<'EOF'
          CONFIG_TARGET_ramips=y
          CONFIG_TARGET_ramips_mt76x8=y
          CONFIG_TARGET_ramips_mt76x8_DEVICE_fw28-v21=y
          CONFIG_TARGET_OPTIMIZATION="-Os -pipe"
          CONFIG_SMALL_FLASH=y
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_TARGET_KERNEL_PARTSIZE=2048
          CONFIG_TARGET_ROOTFS_PARTSIZE=9728
          CONFIG_PACKAGE_kmod-mt76x8=y
          CONFIG_PACKAGE_kmod-usb-core=y
          CONFIG_PACKAGE_kmod-usb2=y
          CONFIG_PACKAGE_kmod-usb-ohci=y
          CONFIG_PACKAGE_kmod-usb-serial=y
          CONFIG_PACKAGE_kmod-usb-serial-option=y
          CONFIG_PACKAGE_kmod-usb-net=y
          CONFIG_PACKAGE_kmod-usb-net-qmi-wwan=y
          CONFIG_PACKAGE_usb-modeswitch=y
          CONFIG_PACKAGE_uqmi=y
          CONFIG_PACKAGE_luci-proto-qmi=y
          CONFIG_PACKAGE_luci-i18n-qmi-zh-cn=y
          CONFIG_PACKAGE_dnsmasq=y
          CONFIG_PACKAGE_firewall=y
          CONFIG_PACKAGE_wpad-basic-mbedtls=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-base=y
          CONFIG_PACKAGE_luci-mod-network=y
          CONFIG_PACKAGE_luci-theme-bootstrap=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_uhttpd=y
          CONFIG_PACKAGE_dropbear=y
          # CONFIG_IPV6 is not set
          EOF

      - name: Make defconfig
        run: make defconfig

      - name: Update and install feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Download packages
        run: make download -j$(nproc)

      - name: Build firmware
        run: make -j$(nproc) V=s

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FW28-V21-Fixed-QMI
          path: bin/targets/ramips/mt76x8/*sysupgrade.bin
