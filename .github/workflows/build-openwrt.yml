name: Build OpenWrt

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout OpenWrt source
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: openwrt-23.05
          path: openwrt

      - name: Setup environment
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses5-dev libssl-dev python3-pip git unzip wget

      - name: Copy config
        run: cp .config openwrt/.config

      - name: Build firmware
        working-directory: openwrt
        run: |
          make -j$(nproc) defconfig
          make -j$(nproc) download
          make -j$(nproc)
