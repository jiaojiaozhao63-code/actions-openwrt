name: Build OpenWrt

on:
  workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout OpenWrt source
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: openwrt-23.05
          path: OpenWrt

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses5-dev libssl-dev python3 git unzip wget

      - name: Generate MT7628 config
        working-directory: OpenWrt
        run: |
          make defconfig
          sed -i 's/^# CONFIG_TARGET_ramips_mt7628.*/CONFIG_TARGET_ramips_mt7628=y/' .config
          make defconfig

      - name: Build firmware
        working-directory: OpenWrt
        run: |
          make download -j$(nproc)
          make -j$(nproc)

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-Firmware
          path: OpenWrt/bin/targets/ramips/mt7628/*.bin
