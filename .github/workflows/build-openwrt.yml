name: FW28-V21 稳定编译版
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  OPENWRT_DIR: openwrt

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends build-essential libncurses-dev git python3 unzip wget gawk flex bison libssl-dev zlib1g-dev libelf-dev subversion gcc-multilib

      - name: 克隆源码
        uses: actions/checkout@v5
        with:
          repository: openwrt/openwrt
          ref: openwrt-23.05
          path: ${{ env.OPENWRT_DIR }}

      - name: 写入配置文件
        run: |
          cd ${{ env.OPENWRT_DIR }}
          mkdir -p files/etc/config files/etc/usb_modeswitch.d files/etc/init.d files/etc/rc.d

          cat > files/etc/config/network <<'EOF'
          config interface 'loopback'
            option device 'lo'
            option proto 'static'
            option ipaddr '127.0.0.1'
            option netmask '255.0.0.0'

          config device
            option name 'br-lan'
            option type 'bridge'
            list ports 'eth0'

          config interface 'lan'
            option device 'br-lan'
            option proto 'static'
            option ipaddr '192.168.1.1'
            option netmask '255.255.255.0'

          config interface '4g'
            option proto 'qmi'
            option device '/dev/cdc-wdm0'
            option apn 'cmnet'
            option auth 'none'
            option ipv6 '0'
          EOF

          cat > files/etc/config/wireless <<'EOF'
          config wifi-device 'radio0'
            option type 'mac80211'
            option band '2g'
            option channel '6'
            option htmode 'HT20'
            option disabled '0'

          config wifi-iface 'default_radio0'
            option device 'radio0'
            option network 'lan'
            option mode 'ap'
            option ssid 'FW28-V21'
            option encryption 'psk2'
            option key '12345678'
          EOF

          cat > files/etc/config/dhcp <<'EOF'
          config dnsmasq
            option domainneeded '1'
            option boguspriv '1'
            option localise_queries '1'
          EOF

      - name: 添加设备定义
        run: |
          cd ${{ env.OPENWRT_DIR }}
          echo 'define Device/fw28-v21' >> target/linux/ramips/image/mt76x8.mk
          echo '  DEVICE_VENDOR := FW28' >> target/linux/ramips/image/mt76x8.mk
          echo '  DEVICE_MODEL := V21' >> target/linux/ramips/image/mt76x8.mk
          echo '  KERNEL_LOADADDR := 0x80000000' >> target/linux/ramips/image/mt76x8.mk
          echo '  IMAGE_SIZE := 7872k' >> target/linux/ramips/image/mt76x8.mk
          echo '  SUPPORTED_DEVICES += fw28_v21' >> target/linux/ramips/image/mt76x8.mk
          echo 'endef' >> target/linux/ramips/image/mt76x8.mk
          echo 'TARGET_DEVICES += fw28-v21' >> target/linux/ramips/image/mt76x8.mk

      - name: 生成编译配置
        run: |
          cd ${{ env.OPENWRT_DIR }}
          cat > .config <<'EOF'
          CONFIG_TARGET_ramips=y
          CONFIG_TARGET_ramips_mt76x8=y
          CONFIG_TARGET_ramips_mt76x8_DEVICE_fw28-v21=y
          CONFIG_SMALL_FLASH=y
          CONFIG_PACKAGE_kmod-usb2=y
          CONFIG_PACKAGE_kmod-usb-serial=y
          CONFIG_PACKAGE_kmod-usb-net-qmi=y
          CONFIG_PACKAGE_usb-modeswitch=y
          EOF

      - name: 增加 Swap 防止内存不足
        run: |
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: 编译固件
        run: |
          cd ${{ env.OPENWRT_DIR }}
          make download -j1
          make -j1 V=s

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: ${{ env.OPENWRT_DIR }}/bin/targets/ramips/mt76x8/*.bin
