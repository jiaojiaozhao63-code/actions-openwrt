name: FW28-V21 4G 最终稳定版（带错误诊断）

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # 消除 Node.js 20 警告
  OPENWRT_DIR: openwrt

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses-dev git python3 unzip gawk flex bison libssl-dev wget

      - name: 克隆 OpenWrt
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: openwrt-23.05
          path: ${{ env.OPENWRT_DIR }}

      - name: 清理旧缓存（避免残留问题）
        run: |
          cd $OPENWRT_DIR
          rm -rf build_dir staging_dir dl .ccache feeds

      - name: 使用清华源加速下载
        run: |
          cd $OPENWRT_DIR
          find . -name '*.mk' -exec sed -i 's|https\?://downloads.openwrt.org|https://mirrors.tuna.tsinghua.edu.cn/openwrt|g' {} \;

      - name: 写入定制文件
        run: |
          mkdir -p $OPENWRT_DIR/files/etc/config \
                   $OPENWRT_DIR/files/etc/init.d \
                   $OPENWRT_DIR/files/etc/sysctl.d

          cat > $OPENWRT_DIR/files/etc/config/network <<'EOF'
          config interface 'loopback'
            option device 'lo'
            option proto 'static'
            option ipaddr '127.0.0.1'

          config device
            option name 'br-lan'
            type bridge
            list ports 'eth0'

          config interface 'lan'
            option device 'br-lan'
            option proto 'static'
            option ipaddr '192.168.1.1'

          config interface '4g'
            option proto 'qmi'
            option device '/dev/cdc-wdm0'
            option apn 'cmnet'
            option ipv6 '0'
            option pdptype 'ipv4'
          EOF

          cat > $OPENWRT_DIR/files/etc/init.d/4g-modem <<'EOF'
          #!/bin/sh /etc/rc.common
          START=35
          USE_PROCD=1
          start_service() {
              usb_modeswitch -v 0x1782 -p 0x4d15 -M "5553424312345678000000000000061b000000020000000000000000000000"
              sleep 3
              modprobe usbserial
              modprobe option
              modprobe qmi_wwan
          }
          EOF
          chmod +x $OPENWRT_DIR/files/etc/init.d/4g-modem

          # 启用开机自启
          ln -sf ../init.d/4g-modem $OPENWRT_DIR/files/etc/rc.d/S354g-modem

          # 禁用 IPv6 + 开启 BBR
          cat > $OPENWRT_DIR/files/etc/sysctl.d/99-custom.conf <<'EOF'
          net.ipv6.conf.all.disable_ipv6=1
          net.ipv6.conf.default.disable_ipv6=1
          net.core.default_qdisc=fq
          net.ipv4.tcp_congestion_control=bbr
          EOF

      - name: 添加设备定义
        run: |
          cd $OPENWRT_DIR
          cat >> target/linux/ramips/image/mt76x8.mk <<'DEV'

          define Device/fw28-v21
            DEVICE_VENDOR := FW28
            DEVICE_MODEL := V21
            DEVICE_PACKAGES := kmod-usb2 kmod-usb-serial kmod-usb-serial-option kmod-usb-net-qmi-wwan usb-modeswitch uqmi luci luci-proto-qmi kmod-tcp-bbr
            KERNEL_LOADADDR := 0x80000000
            IMAGE_SIZE := 7872k
            IMAGES += factory.bin
            IMAGE/factory.bin := $$(sysupgrade_bin) | pad-to 7872k | append-metadata
            SUPPORTED_DEVICES += fw28,v21
          endef
          TARGET_DEVICES += fw28-v21
          DEV

      - name: 更新 feeds
        run: |
          cd $OPENWRT_DIR
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 生成完整 .config（自动补全，不会卡死）
        run: |
          cd $OPENWRT_DIR
          cat > .config <<'EOF'
          CONFIG_TARGET_ramips=y
          CONFIG_TARGET_ramips_mt76x8=y
          CONFIG_TARGET_ramips_mt76x8_DEVICE_fw28-v21=y
          CONFIG_SMALL_FLASH=y
          CONFIG_PACKAGE_kmod-usb-net-qmi-wwan=y
          CONFIG_PACKAGE_usb-modeswitch=y
          CONFIG_PACKAGE_uqmi=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-proto-qmi=y
          CONFIG_PACKAGE_kmod-tcp-bbr=y
          # CONFIG_IPV6 is not set
          EOF
          export TERM=dumb
          make defconfig   # 自动填充所有依赖，非交互

      - name: 下载源代码（串行 + 镜像）
        run: cd $OPENWRT_DIR && make download -j1
        timeout-minutes: 90

      - name: 编译固件（单线程 + 详细日志）
        run: cd $OPENWRT_DIR && make -j1 V=s
        timeout-minutes: 360

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: FW28-V21-FINAL
          path: ${{ env.OPENWRT_DIR }}/bin/targets/ramips/mt76x8/*factory.bin
