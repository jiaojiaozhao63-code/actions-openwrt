name: Build FW28-V21 Minimal (No Fail)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends build-essential libncurses-dev git python3 unzip wget gawk flex bison libssl-dev zlib1g-dev libelf-dev subversion libncursesw5-dev libreadline-dev libtool automake autoconf pkg-config gcc-multilib g++-multilib

      - name: Clone OpenWrt
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: openwrt-23.05
          fetch-depth: 1

      - name: Prepare custom files
        run: |
          mkdir -p files/etc/config files/etc/uci-defaults
          cat > files/etc/config/network <<'NETWORK'
          config interface 'loopback'
            option device 'lo'
            option proto 'static'
            option ipaddr '127.0.0.1'
            option netmask '255.0.0.0'
          config globals 'globals'
            option ula_prefix 'fd00::/48'
          config device
            option name 'br-lan'
            option type 'bridge'
            list ports 'eth0'
          config interface 'lan'
            option device 'br-lan'
            option proto 'static'
            option ipaddr '192.168.1.1'
            option netmask '255.255.255.0'
            option ip6assign 'none'
          config interface '4g'
            option proto 'qmi'
            option device '/dev/cdc-wdm0'
            option apn 'cmnet'
            option auth 'none'
            option ipv6 '0'
          NETWORK
          cat > files/etc/uci-defaults/99-load <<'EOF'
          #!/bin/sh
          modprobe usbserial
          modprobe usbnet
          modprobe option
          modprobe qmi_wwan
          EOF
          chmod +x files/etc/uci-defaults/99-load

      - name: Add device definition
        run: |
          printf '\n%s\n' \
            "define Device/fw28-v21" \
            "  DEVICE_VENDOR := FW28" \
            "  DEVICE_MODEL := V21" \
            "  DEVICE_PACKAGES := kmod-usb2 kmod-usb-serial kmod-usb-serial-option kmod-usb-net kmod-usb-net-qmi-wwan usb-modeswitch uqmi luci-proto-qmi" \
            "  KERNEL_LOADADDR := 0x80000000" \
            "  IMAGE_SIZE := 7872k" \
            "  IMAGES += factory.bin" \
            "  IMAGE/factory.bin := \$$(sysupgrade_bin) | pad-to 7872k | append-metadata" \
            "  SUPPORTED_DEVICES += fw28,v21" \
            "endef" \
            "TARGET_DEVICES += fw28-v21" \
            >> target/linux/ramips/image/mt76x8.mk

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Create base .config
        run: |
          cat > .config <<'CONFIG'
          CONFIG_TARGET_ramips=y
          CONFIG_TARGET_ramips_mt76x8=y
          CONFIG_TARGET_ramips_mt76x8_DEVICE_fw28-v21=y
          CONFIG_SMALL_FLASH=y
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_PACKAGE_kmod-mt76x8=y
          CONFIG_PACKAGE_kmod-usb-core=y
          CONFIG_PACKAGE_kmod-usb2=y
          CONFIG_PACKAGE_kmod-usb-serial=y
          CONFIG_PACKAGE_kmod-usb-serial-option=y
          CONFIG_PACKAGE_kmod-usb-net=y
          CONFIG_PACKAGE_kmod-usb-net-qmi-wwan=y
          CONFIG_PACKAGE_usb-modeswitch=y
          CONFIG_PACKAGE_uqmi=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-proto-qmi=y
          CONFIG_PACKAGE_dnsmasq=y
          CONFIG_PACKAGE_firewall=y
          CONFIG_PACKAGE_uhttpd=y
          CONFIG_PACKAGE_dropbear=y
          # CONFIG_IPV6 is not set
          CONFIG

      - name: Expand config
        run: |
          export TERM=dumb
          make olddefconfig

      - name: Download all sources
        run: make download -j$(nproc)

      - name: Build firmware
        run: make -j$(nproc) V=s

      - name: Check firmware size
        run: |
          max_size=$((7872*1024))
          fw_file=$(ls bin/targets/ramips/mt76x8/*factory.bin 2>/dev/null | head -1)
          if [ -z "$fw_file" ]; then
            echo "ERROR: No factory.bin file generated!"
            exit 1
          fi
          actual_size=$(stat -c%s "$fw_file")
          if [ $actual_size -gt $max_size ]; then
            echo "ERROR: Firmware too large! ($actual_size > $max_size)"
            exit 1
          fi
          echo "✅ Firmware size OK: $actual_size bytes"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FW28-V21-Minimal
          path: bin/targets/ramips/mt76x8/*factory.bin
          if-no-files-found: error
