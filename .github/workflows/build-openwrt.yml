name: Build FW28-V21 Factory Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses-dev git python3 unzip wget gawk flex bison libssl-dev zlib1g-dev libelf-dev subversion libncursesw5-dev libreadline-dev libtool automake autoconf pkg-config ccache gcc-multilib g++-multilib

      - name: Clone OpenWrt
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: openwrt-23.05

      - name: Prepare custom files and device definition
        run: |
          mkdir -p files/etc/uci-defaults files/etc/hotplug.d/iface files/etc/config files/usr/share/usb_modeswitch

          # 1. 加载驱动
          cat > files/etc/uci-defaults/99-load-modules <<'EOF'
          #!/bin/sh
          [ -f "/etc/loaded_modules" ] && exit 0
          modprobe usbserial
          modprobe usbnet
          modprobe option
          modprobe qmi_wwan
          touch /etc/loaded_modules
          EOF
          chmod +x files/etc/uci-defaults/99-load-modules

          # 2. 展锐模式切换
          cat > files/etc/uci-defaults/99-unisoc-mode <<'EOF'
          #!/bin/sh
          sleep 5
          if lsusb | grep -q "1782:4e00"; then
            /usr/sbin/usb_modeswitch -v 0x1782 -p 0x4e00 -W -R
          fi
          EOF
          chmod +x files/etc/uci-defaults/99-unisoc-mode

          # 3. 网络配置
          cat > files/etc/config/network <<'NETWORK'
          config interface 'loopback'
            option device 'lo'
            option proto 'static'
            option ipaddr '127.0.0.1'
            option netmask '255.0.0.0'

          config globals 'globals'
            option ula_prefix 'fd00::/48'

          config device
            option name 'br-lan'
            option type 'bridge'
            list ports 'eth0'

          config interface 'lan'
            option device 'br-lan'
            option proto 'static'
            option ipaddr '192.168.1.1'
            option netmask '255.255.255.0'
            option ip6assign 'none'

          config interface '4g'
            option proto 'qmi'
            option device '/dev/cdc-wdm0'
            option apn 'cmnet'
            option auth 'none'
            option ipv6 '0'
          NETWORK

          # 4. 无线
          cat > files/etc/config/wireless <<'WIRELESS'
          config wifi-device 'radio0'
            option type 'mac80211'
            option band '2g'
            option channel '6'
            option htmode 'HT20'
            option country 'CN'
            option disabled '0'

          config wifi-iface 'default_radio0'
            option device 'radio0'
            option network 'lan'
            option mode 'ap'
            option ssid 'FW28-V21'
            option encryption 'none'
          WIRELESS

          # 5. 设备定义（官方标准写法，避免打包错误）
          cat >> target/linux/ramips/image/mt76x8.mk <<'MK'
          define Device/fw28-v21
            DEVICE_VENDOR := FW28
            DEVICE_MODEL := V21
            DEVICE_PACKAGES := kmod-usb2 kmod-usb-serial kmod-usb-serial-option kmod-usb-net-qmi-wwan usb-modeswitch uqmi luci-proto-qmi luci-i18n-base-zh-cn
            KERNEL_LOADADDR := 0x80000000
            IMAGE_SIZE := 16064k
            SUPPORTED_DEVICES += fw28,v21
          endef
          TARGET_DEVICES += fw28-v21
          MK

      - name: Config (修复配置同步问题)
        run: |
          # 1. 先更新 feeds，让 make 知道所有包
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          # 2. 再写配置文件
          cat > .config <<'CONFIG'
          CONFIG_TARGET_ramips=y
          CONFIG_TARGET_ramips_mt76x8=y
          CONFIG_TARGET_ramips_mt76x8_DEVICE_fw28-v21=y
          CONFIG_TARGET_OPTIMIZATION="-Os -pipe"
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_PACKAGE_kmod-mt76x8=y
          CONFIG_PACKAGE_kmod-usb-core=y
          CONFIG_PACKAGE_kmod-usb2=y
          CONFIG_PACKAGE_kmod-usb-ohci=y
          CONFIG_PACKAGE_kmod-usb-serial=y
          CONFIG_PACKAGE_kmod-usb-serial-option=y
          CONFIG_PACKAGE_kmod-usb-net=y
          CONFIG_PACKAGE_kmod-usb-net-qmi-wwan=y
          CONFIG_PACKAGE_usb-modeswitch=y
          CONFIG_PACKAGE_uqmi=y
          CONFIG_PACKAGE_luci-proto-qmi=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_dnsmasq=y
          CONFIG_PACKAGE_firewall=y
          CONFIG_PACKAGE_wpad-basic-mbedtls=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-base=y
          CONFIG_PACKAGE_luci-mod-network=y
          CONFIG_PACKAGE_luci-theme-bootstrap=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_uhttpd=y
          CONFIG_PACKAGE_dropbear=y
          CONFIG_PACKAGE_ethtool=y
          # CONFIG_IPV6 is not set
          CONFIG
          # 3. 用 defconfig 同步配置，解决 "out of sync" 警告
          make defconfig

      - name: Download packages
        run: make download -j$(nproc)

      - name: Build firmware
        run: make -j$(nproc) V=s

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FW28-V21-Factory
          path: bin/targets/ramips/mt76x8/*factory.bin
          if-no-files-found: error
