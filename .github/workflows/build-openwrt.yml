          # 只做格式整理，不进行任何网络或交互操作
          make olddefconfig

      - name: 下载源代码（串行 + 重试）
        run: |
          cd $OPENWRT_DIR
          for i in 1 2 3; do
            echo "Download attempt $i at $(date)"
            if make download -j1 V=s 2>&1 | tee download.log; then
              echo "Download succeeded"
              break
            else
              echo "Download attempt $i failed"
              tail -50 download.log
              if [ $i -eq 3 ]; then
                echo "Download failed after 3 attempts"
                exit 1
              fi
              sleep 10
            fi
          done

      - name: 编译固件（单线程）
        run: |
          cd $OPENWRT_DIR
          make -j1 V=s

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: FW28-V21-FINAL
          path: ${{ env.OPENWRT_DIR }}/bin/targets/ramips/mt76x8/*factory.bin
