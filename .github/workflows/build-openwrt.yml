name: FW28-V21 4G 最终稳定版（跳过 defconfig）

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  OPENWRT_DIR: openwrt

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses-dev git python3 unzip gawk flex bison libssl-dev wget time

      - name: 克隆 OpenWrt
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: openwrt-23.05
          path: ${{ env.OPENWRT_DIR }}

      - name: 清理残留缓存
        run: |
          cd $OPENWRT_DIR
          rm -rf build_dir staging_dir dl .ccache feeds

      - name: 使用清华源加速下载
        run: |
          cd $OPENWRT_DIR
          find . -name '*.mk' -exec sed -i 's|https\?://downloads.openwrt.org|https://mirrors.tuna.tsinghua.edu.cn/openwrt|g' {} \;

      - name: 写入定制文件（开机自启、网络、BBR等）
        run: |
          mkdir -p $OPENWRT_DIR/files/etc/config \
                   $OPENWRT_DIR/files/etc/init.d \
                   $OPENWRT_DIR/files/etc/sysctl.d \
                   $OPENWRT_DIR/files/etc/rc.d

          cat > $OPENWRT_DIR/files/etc/config/network <<'EOF'
          config interface 'loopback'
            option device 'lo'
            option proto 'static'
            option ipaddr '127.0.0.1'

          config device
            option name 'br-lan'
            type bridge
            list ports 'eth0'

          config interface 'lan'
            option device 'br-lan'
            option proto 'static'
            option ipaddr '192.168.1.1'

          config interface '4g'
            option proto 'qmi'
            option device '/dev/cdc-wdm0'
            option apn 'cmnet'
            option ipv6 '0'
            option pdptype 'ipv4'
          EOF

          cat > $OPENWRT_DIR/files/etc/init.d/4g-modem <<'EOF'
          #!/bin/sh /etc/rc.common
          START=35
          USE_PROCD=1
          start_service() {
              usb_modeswitch -v 0x1782 -p 0x4d15 -M "5553424312345678000000000000061b000000020000000000000000000000"
              sleep 3
              modprobe usbserial
              modprobe option
              modprobe qmi_wwan
          }
          EOF
          chmod +x $OPENWRT_DIR/files/etc/init.d/4g-modem
          ln -sf ../init.d/4g-modem $OPENWRT_DIR/files/etc/rc.d/S354g-modem

          cat > $OPENWRT_DIR/files/etc/sysctl.d/99-custom.conf <<'EOF'
          net.ipv6.conf.all.disable_ipv6=1
          net.ipv6.conf.default.disable_ipv6=1
          net.core.default_qdisc=fq
          net.ipv4.tcp_congestion_control=bbr
          EOF

      - name: 添加设备定义
        run: |
          cd $OPENWRT_DIR
          grep -q "fw28-v21" target/linux/ramips/image/mt76x8.mk || {
            cat >> target/linux/ramips/image/mt76x8.mk <<'DEV'

          define Device/fw28-v21
            DEVICE_VENDOR := FW28
            DEVICE_MODEL := V21
            DEVICE_PACKAGES := kmod-usb2 kmod-usb-serial kmod-usb-serial-option kmod-usb-net-qmi-wwan usb-modeswitch uqmi kmod-tcp-bbr
            KERNEL_LOADADDR := 0x80000000
            IMAGE_SIZE := 7872k
            IMAGES += factory.bin
            IMAGE/factory.bin := $$(sysupgrade_bin) | pad-to 7872k | append-metadata
            SUPPORTED_DEVICES += fw28,v21
          endef
          TARGET_DEVICES += fw28-v21
          DEV
          }

      - name: 更新 feeds
        run: |
          cd $OPENWRT_DIR
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 写入完整 .config（直接使用预配置，跳过 defconfig）
        run: |
          cd $OPENWRT_DIR
          cat > .config <<'EOF'
          # 自动生成的完整配置（基于 ramips/mt76x8 默认 + 必要包）
          CONFIG_TARGET_ramips=y
          CONFIG_TARGET_ramips_mt76x8=y
          CONFIG_TARGET_ramips_mt76x8_DEVICE_fw28-v21=y
          CONFIG_SMALL_FLASH=y
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_TARGET_ROOTFS_INCLUDE_KERNEL=y
          CONFIG_TARGET_ROOTFS_INCLUDE_DTB=y
          CONFIG_TARGET_IMAGES_GZIP=y
          CONFIG_TARGET_INITRAMFS_COMPRESSION_LZMA=y
          CONFIG_KERNEL_BUILD_USER="builder"
          CONFIG_KERNEL_BUILD_DOMAIN="openwrt.org"
          CONFIG_DEVEL=y
          CONFIG_TOOLCHAINOPTS=y
          CONFIG_SSP_SUPPORT=y
          CONFIG_BINUTILS_VERSION_2.40=y
          CONFIG_GCC_VERSION_12.3.0=y
          CONFIG_LIBC_USE_MUSL=y
          CONFIG_TARGET_SUBTARGET="mt76x8"
          CONFIG_TARGET_PROFILE="DEVICE_fw28-v21"
          CONFIG_TARGET_PER_DEVICE_ROOTFS=y
          CONFIG_TARGET_INIT_PATH="/usr/sbin:/usr/bin:/sbin:/bin"
          CONFIG_TARGET_PREINIT_SUPPRESS_STDERR=y
